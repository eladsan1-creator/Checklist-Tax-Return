<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מערכת ניהול דוחות | משרד בן משה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&family=Frank+Ruhl+Libre:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2744;
  --navy2: #243258;
  --navy3: #0f1a30;
  --gold: #c9a84c;
  --gold2: #e8c97a;
  --cream: #f7f4ee;
  --white: #ffffff;
  --green: #1a6640;
  --green-bg: #d4edda;
  --orange: #b5451b;
  --orange-bg: #fde8e0;
  --blue: #1d4ed8;
  --blue-bg: #dbeafe;
  --gray: #6b7280;
  --gray2: #9ca3af;
  --border: #e2ddd4;
  --shadow-sm: 0 1px 4px rgba(26,39,68,0.08);
  --shadow: 0 4px 20px rgba(26,39,68,0.12);
  --shadow-lg: 0 8px 40px rgba(26,39,68,0.18);
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Heebo', sans-serif; background: var(--cream); color: var(--navy); min-height: 100vh; }

.view { display: none !important; }
.view.active { display: block !important; }

/* LOGIN */
#loginView {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: var(--navy3);
  background-image: radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.15) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(36,50,88,0.8) 0%, transparent 50%);
}
#loginView.active { display: flex !important; }
.login-box {
  background: var(--white); border-radius: 20px; padding: 48px 40px;
  width: 360px; box-shadow: var(--shadow-lg); text-align: center;
}
.login-logo { font-family: 'Frank Ruhl Libre', serif; font-size: 26px; font-weight: 900; color: var(--navy); margin-bottom: 4px; }
.login-sub { font-size: 12px; color: var(--gray); letter-spacing: 1px; margin-bottom: 32px; }
.login-divider { width: 40px; height: 2px; background: var(--gold); margin: 0 auto 28px; border-radius: 2px; }
.login-label { font-size: 13px; font-weight: 500; color: var(--navy); text-align: right; margin-bottom: 6px; display: block; }
.login-input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-family: 'Heebo', sans-serif; font-size: 14px; color: var(--navy); background: var(--cream);
  outline: none; transition: border-color 0.2s; text-align: right; margin-bottom: 16px;
}
.login-input:focus { border-color: var(--gold); background: white; }
.login-btn {
  width: 100%; padding: 14px; background: var(--navy); color: white;
  border: none; border-radius: var(--radius-sm);
  font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; margin-top: 4px;
}
.login-btn:hover { background: var(--navy2); transform: translateY(-1px); box-shadow: var(--shadow); }
.login-err { font-size: 13px; color: var(--orange); margin-top: 10px; display: none; }

/* APP SHELL */
.app-shell { display: none !important; flex-direction: column; min-height: 100vh; }
.app-shell.active { display: flex !important; }

.topbar {
  background: var(--navy); padding: 0 24px; height: 58px;
  display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 12px rgba(0,0,0,0.2);
}
.topbar-logo { font-family: 'Frank Ruhl Libre', serif; font-size: 18px; font-weight: 700; color: var(--gold); }
.topbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.15); }
.topbar-nav { display: flex; gap: 4px; flex: 1; }
.nav-btn {
  padding: 6px 16px; border-radius: 20px; border: none; background: transparent; cursor: pointer;
  font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 500;
  color: rgba(255,255,255,0.6); transition: all 0.2s;
}
.nav-btn:hover { color: white; background: rgba(255,255,255,0.08); }
.nav-btn.active { color: var(--gold); background: rgba(201,168,76,0.15); }
.topbar-logout {
  font-size: 12px; color: rgba(255,255,255,0.4); cursor: pointer;
  padding: 6px 10px; border-radius: 6px; border: none; background: none;
  font-family: 'Heebo', sans-serif; transition: color 0.2s;
}
.topbar-logout:hover { color: rgba(255,255,255,0.8); }

.app-content { flex: 1; padding: 28px 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

/* LOADING OVERLAY */
.loading-overlay {
  position: fixed; inset: 0; background: rgba(15,26,48,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; display: none;
}
.loading-overlay.show { display: flex; }
.loading-spinner {
  background: white; border-radius: 16px; padding: 32px 40px; text-align: center;
}
.spinner {
  width: 40px; height: 40px; border: 3px solid var(--border);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--navy); font-weight: 500; }

/* DASHBOARD */
.dash-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--white); border-radius: var(--radius); padding: 20px;
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
}
.stat-icon { font-size: 24px; margin-bottom: 8px; }
.stat-num { font-family: 'Frank Ruhl Libre', serif; font-size: 32px; font-weight: 700; color: var(--navy); }
.stat-label { font-size: 12px; color: var(--gray); margin-top: 2px; }

.section-title-bar {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
}
.section-heading { font-family: 'Frank Ruhl Libre', serif; font-size: 20px; font-weight: 700; }

/* CLIENT LIST */
.clients-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.client-card {
  background: var(--white); border-radius: var(--radius); padding: 20px;
  border: 1px solid var(--border); box-shadow: var(--shadow-sm);
  cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
}
.client-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--gold); }
.client-card-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.client-card-meta { font-size: 12px; color: var(--gray); margin-bottom: 14px; }
.client-progress-bar-bg { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; margin-bottom: 6px; }
.client-progress-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--gold), var(--gold2)); transition: width 0.4s; }
.client-progress-txt { font-size: 11px; color: var(--gray); }
.client-card-actions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.btn-sm {
  padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer;
  font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 500; transition: all 0.15s;
}
.btn-primary { background: var(--navy); color: white; }
.btn-primary:hover { background: var(--navy2); }
.btn-outline { background: transparent; color: var(--navy); border: 1px solid var(--border); }
.btn-outline:hover { background: var(--cream); border-color: var(--navy); }
.btn-gold { background: var(--gold); color: var(--navy); font-weight: 600; }
.btn-gold:hover { background: var(--gold2); }
.btn-danger { background: transparent; color: var(--orange); border: 1px solid #fca99a; }
.btn-danger:hover { background: var(--orange-bg); }

.add-client-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--navy); color: white;
  padding: 10px 20px; border-radius: var(--radius-sm); border: none;
  font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.add-client-btn:hover { background: var(--navy2); transform: translateY(-1px); }

/* CLIENT EDITOR */
.editor-back {
  display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--gray);
  cursor: pointer; margin-bottom: 20px; width: fit-content; transition: color 0.2s;
}
.editor-back:hover { color: var(--navy); }
.editor-header {
  background: var(--navy); border-radius: var(--radius); padding: 24px;
  margin-bottom: 20px; display: flex; align-items: center; gap: 16px;
}
.editor-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: rgba(201,168,76,0.2); border: 2px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: var(--gold);
  font-family: 'Frank Ruhl Libre', serif; flex-shrink: 0;
}
.editor-client-name { font-size: 20px; font-weight: 700; color: white; }
.editor-client-meta { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 2px; }
.editor-actions { margin-right: auto; display: flex; gap: 8px; }

.link-box {
  background: var(--cream); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 16px;
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
}
.link-box-url { font-size: 12px; color: var(--blue); flex: 1; word-break: break-all; direction: ltr; text-align: left; }
.copy-btn {
  padding: 6px 14px; border-radius: 6px; background: var(--navy); color: white; border: none;
  font-family: 'Heebo', sans-serif; font-size: 12px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.copy-btn:hover { background: var(--navy2); }

.editor-sections { display: flex; flex-direction: column; gap: 16px; }
.editor-section {
  background: var(--white); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow-sm);
}
.editor-section-header {
  display: flex; align-items: center; gap: 10px; padding: 14px 18px;
  background: var(--navy); cursor: pointer;
}
.editor-section-icon { font-size: 16px; }
.editor-section-title { font-size: 14px; font-weight: 600; color: white; flex: 1; }
.editor-section-stats { font-size: 12px; color: rgba(255,255,255,0.6); }
.editor-section-toggle { color: rgba(255,255,255,0.5); font-size: 14px; transition: transform 0.2s; }
.editor-section-toggle.open { transform: rotate(180deg); }
.editor-section-body { padding: 8px 0; }
.editor-section-body.collapsed { display: none; }

.editor-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 18px; border-bottom: 1px solid #f5f1eb; transition: background 0.1s;
}
.editor-item:last-child { border-bottom: none; }
.editor-item:hover { background: var(--cream); }
.editor-item-text { flex: 1; font-size: 13px; color: var(--navy); }
.editor-item-note { font-size: 11px; color: var(--gray); margin-top: 2px; }

.status-select {
  padding: 4px 8px; border-radius: 20px; border: 1px solid var(--border);
  font-family: 'Heebo', sans-serif; font-size: 11px; font-weight: 500;
  cursor: pointer; outline: none; transition: all 0.2s;
  -webkit-appearance: none; appearance: none; text-align: center; min-width: 90px;
}
.status-select.s-missing { background: var(--orange-bg); color: var(--orange); border-color: #fca99a; }
.status-select.s-ok { background: var(--green-bg); color: var(--green); border-color: #86efb1; }
.status-select.s-na { background: #f3f4f6; color: var(--gray); border-color: #e5e7eb; }
.status-select.s-pending { background: var(--blue-bg); color: var(--blue); border-color: #93c5fd; }

.item-del-btn {
  background: none; border: none; cursor: pointer; padding: 4px;
  color: #d1c9bc; font-size: 16px; transition: color 0.2s; line-height: 1;
}
.item-del-btn:hover { color: var(--orange); }

.add-item-row {
  display: flex; gap: 8px; padding: 12px 18px;
  border-top: 1px dashed var(--border); background: #faf8f4;
}
.add-item-input {
  flex: 1; padding: 8px 12px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-family: 'Heebo', sans-serif; font-size: 13px;
  outline: none; text-align: right; background: white;
}
.add-item-input:focus { border-color: var(--gold); }
.add-item-btn {
  padding: 8px 14px; background: var(--gold); color: var(--navy);
  border: none; border-radius: var(--radius-sm); cursor: pointer;
  font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 600; white-space: nowrap;
}
.add-item-btn:hover { background: var(--gold2); }

/* MODALS */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(10,18,36,0.6);
  align-items: center; justify-content: center;
  z-index: 500; padding: 20px; display: none;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: 16px; padding: 32px;
  width: 100%; max-width: 440px; box-shadow: var(--shadow-lg);
}
.modal-title { font-family: 'Frank Ruhl Libre', serif; font-size: 20px; margin-bottom: 20px; }
.modal-input {
  width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-family: 'Heebo', sans-serif; font-size: 14px;
  color: var(--navy); background: var(--cream); outline: none; text-align: right;
  margin-bottom: 12px; transition: border-color 0.2s;
}
.modal-input:focus { border-color: var(--gold); background: white; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.modal-btn {
  flex: 1; padding: 12px; border-radius: var(--radius-sm); border: none;
  font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer;
}
.modal-btn-primary { background: var(--navy); color: white; }
.modal-btn-primary:hover { background: var(--navy2); }
.modal-btn-cancel { background: var(--cream); color: var(--gray); border: 1px solid var(--border); }

/* TOAST */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: var(--navy); color: white; padding: 12px 24px;
  border-radius: 30px; font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow-lg); z-index: 1000; transition: transform 0.3s ease; white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* WHATSAPP BTN */
.wa-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius-sm);
  background: #25d366; color: white; border: none;
  font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s; text-decoration: none;
}
.wa-btn:hover { background: #20ba5a; }

@media (max-width: 640px) {
  .dash-stats { grid-template-columns: repeat(2, 1fr); }
  .clients-grid { grid-template-columns: 1fr; }
  .app-content { padding: 16px; }
  .topbar { padding: 0 16px; }
  .nav-btn { padding: 6px 10px; font-size: 12px; }
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">טוען נתונים...</div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginView" class="view active">
  <div class="login-box">
    <div class="login-logo">משרד בן משה</div>
    <div class="login-sub">עו"ד ורו"ח | ייעוץ מס</div>
    <div class="login-divider"></div>
    <label class="login-label">סיסמה</label>
    <div style="position:relative;margin-bottom:16px">
      <input type="password" class="login-input" id="pwInput" placeholder="הזן סיסמה" onkeydown="if(event.key==='Enter')doLogin()" style="margin-bottom:0;padding-left:42px">
      <button id="eyeBtn" onclick="var i=document.getElementById('pwInput');i.type=i.type==='password'?'text':'password';document.getElementById('eyeBtn').textContent=i.type==='password'?'👁':'🙈'" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;padding:0">👁</button>
    </div>
    <button class="login-btn" onclick="doLogin()">כניסה למערכת</button>
    <div class="login-err" id="loginErr">סיסמה שגויה</div>
  </div>
</div>

<!-- APP -->
<div class="app-shell" id="appShell">
  <div class="topbar">
    <div class="topbar-logo">בן משה</div>
    <div class="topbar-divider"></div>
    <div class="topbar-nav">
      <button class="nav-btn active" id="navDash" onclick="showTab('dash')">🏠 דשבורד</button>
      <button class="nav-btn" id="navClients" onclick="showTab('clients')">👥 לקוחות</button>
    </div>
    <button class="topbar-logout" onclick="doLogout()">יציאה</button>
  </div>
  <div class="app-content">
    <div id="tabDash" class="view active">
      <div class="dash-stats" id="dashStats"></div>
      <div class="section-title-bar">
        <div class="section-heading">לקוחות פעילים</div>
        <button class="add-client-btn" onclick="openAddModal()">+ לקוח חדש</button>
      </div>
      <div class="clients-grid" id="dashClientGrid"></div>
    </div>
    <div id="tabClients" class="view">
      <div class="section-title-bar">
        <div class="section-heading">כל הלקוחות</div>
        <button class="add-client-btn" onclick="openAddModal()">+ לקוח חדש</button>
      </div>
      <div class="clients-grid" id="allClientGrid"></div>
    </div>
    <div id="tabEditor" class="view">
      <div class="editor-back" onclick="showTab('clients')">← חזרה לרשימת לקוחות</div>
      <div id="editorContent"></div>
    </div>
  </div>
</div>

<!-- ADD CLIENT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-title">➕ הוספת לקוח חדש</div>
    <input class="modal-input" id="newClientName" placeholder="שם מלא של הלקוח" onkeydown="if(event.key==='Enter')document.getElementById('newClientNotes').focus()">
    <input class="modal-input" id="newClientNotes" placeholder="הערה (אופציונלי — עצמאי, שכיר, יש נכס...)" onkeydown="if(event.key==='Enter')addClient()">
    <div class="modal-actions">
      <button class="modal-btn modal-btn-primary" onclick="addClient()">הוסף לקוח</button>
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

    { id:"i19", text:"ריבית על פיקדונות / חיסכון", note:"", status:"missing" },
    { id:"i20", text:"רווח ממכירת ניירות ערך זרים", note:"שקלול לפי שער יציג", status:"na" },

  { id:"s6", icon:"🛡️", title:"פנסיה, קופות גמל וביטוחים", items:[

    { id:"i23", text:"אישור הפקדות – קרן השתלמות לעצמאים", note:"ניכוי עד תקרה", status:"missing" },
    { id:"i24", text:"אישור פרמיה – ביטוח אובדן כושר עבודה", note:"ניכוי לפי תקנות", status:"missing" },
    { id:"i25", text:"אישור פרמיה – ביטוח חיים", note:"זיכוי 25% עד תקרה", status:"missing" },
    { id:"i26", text:"טפסי 161 / 161א – פרישה או משיכת כספים", note:"", status:"na" },
  ]},
  { id:"s7", icon:"🎁", title:"זיכויים וניכויים מיוחדים", items:[
    { id:"i27", text:"קבלות תרומות (סעיף 46)", note:"זיכוי 35%, מוסד ברשימת רשות המסים", status:"missing" },
    { id:"i28", text:"ילד עם נכות – תעודה בתוקף (סעיף 45)", note:"", status:"na" },
    { id:"i29", text:"חייל משוחרר – אישור שירות", note:"בשנת השחרור", status:"na" },
    { id:"i30", text:"עולה חדש / תושב חוזר – מסמכי סטטוס", note:"", status:"na" },
  ]},
  { id:"s8", icon:"🌍", title:"מידע על חו\"ל (FATCA/CRS)", items:[
    { id:"i31", text:"חשבונות בנק בחו\"ל – גוף מחזיק, יתרה, ריבית", note:"", status:"missing" },
    { id:"i32", text:"הכנסות מחו\"ל – שכר, דמי ניהול, תמלוגים", note:"", status:"missing" },
    { id:"i33", text:"מס זר ששולם – אישורי ניכוי מס במקור", note:"לצורך זיכוי", status:"missing" },
    { id:"i34", text:"נכסים בחו\"ל: חברות, נדל\"ן, קרנות", note:"פרטים בסיסיים", status:"na" },
  ]},
  { id:"s9", icon:"📄", title:"מסמכים שוטפים וכלליים", items:[
    { id:"i35", text:"כרטיסיות עו\"ש – חשבונות פרטיים ועסקיים", note:"ינואר–דצמבר", status:"missing" },
    { id:"i36", text:"הודעות שומה קודמות / פסיקתאות", note:"אם רלוונטי", status:"missing" },
    { id:"i37", text:"ייפוי כוח חתום – לייצוג מול רשות המסים", note:"אם לא קיים במערכת", status:"missing" },
    { id:"i38", text:"מסמך חריג: ירושה, מכירת נכס, מתנה", note:"כל אירוע חריג בשנה", status:"na" },
  ]},
];

// ── STATE ─────────────────────────────────────────────────────────────────
let clients = [];
let currentClientId = null;
let isSaving = false;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }
function getClient(id) { return clients.find(c => c.id === id); }

// ── LOADING UI ────────────────────────────────────────────────────────────
function showLoading(text) {
  document.getElementById('loadingText').textContent = text || 'טוען...';
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

// ── API CALLS TO APPS SCRIPT ──────────────────────────────────────────────
async function apiCall(action, data) {
  const url = SCRIPT_URL + '?action=' + action;
  const res = await fetch(url, {
    method: 'POST',
    body: JSON.stringify({ action, ...data })
  });
  return res.json();
}

async function loadClients() {
  showLoading('טוען לקוחות...');
  try {
    const url = SCRIPT_URL + '?action=getClients';
    const res = await fetch(url, { method: 'GET' });
    const data = await res.json();
    if (data.success) {
      clients = data.clients || [];
    } else {
      showToast('שגיאה בטעינת נתונים');
    }
  } catch(e) {
    showToast('שגיאת חיבור לשרת');
  }
  hideLoading();
  renderAll();
}

async function saveClients() {
  if (isSaving) return;
  isSaving = true;
  try {
    const encoded = encodeURIComponent(JSON.stringify(clients));
    const url = SCRIPT_URL + '?action=saveClients&data=' + encoded;
    await fetch(url, { method: 'GET', mode: 'no-cors' });
  } catch(e) {
    showToast('שגיאה בשמירת נתונים');
  }
  isSaving = false;
}

// ── AUTH ──────────────────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PASSWORD) {
    sessionStorage.setItem('bm_auth', '1');
    document.getElementById('loginView').classList.remove('active');
    document.getElementById('appShell').classList.add('active');
    loadClients();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('bm_auth');
  document.getElementById('appShell').classList.remove('active');
  document.getElementById('loginView').classList.add('active');
  document.getElementById('pwInput').value = '';
  clients = [];
}

// Auto-login if session active
if (sessionStorage.getItem('bm_auth') === '1') {
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('loginView').classList.remove('active');
    document.getElementById('appShell').classList.add('active');
    loadClients();
  });
}

// ── TOAST ─────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── TABS ──────────────────────────────────────────────────────────────────
function showTab(tab) {
  ['Dash','Clients','Editor'].forEach(t => {
    document.getElementById('tab' + t).classList.remove('active');
  });
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (tab === 'dash') document.getElementById('navDash').classList.add('active');
  if (tab === 'clients') document.getElementById('navClients').classList.add('active');
  if (tab === 'dash' || tab === 'clients') renderAll();
}

// ── STATS ─────────────────────────────────────────────────────────────────
function getClientStats(c) {
  let total = 0, ok = 0, missing = 0;
  c.sections.forEach(s => s.items.forEach(i => {
    if (i.status !== 'na') { total++; if (i.status === 'ok') ok++; else if (i.status === 'missing') missing++; }
  }));
  return { total, ok, missing };
}

// ── CLIENT CARD ───────────────────────────────────────────────────────────
function clientCardHTML(c) {
  const st = getClientStats(c);
  const pct = st.total > 0 ? Math.round(st.ok / st.total * 100) : 0;
  const clientUrl = BASE_CLIENT_URL + '?client=' + encodeURIComponent(c.name) + '&id=' + c.id;
  return `
    <div class="client-card" id="card-${c.id}">
      <div class="client-card-name">${c.name}</div>
      <div class="client-card-meta">${c.notes || 'ללא הערות'} · ${new Date(c.created).getFullYear()}</div>
      <div class="client-progress-bar-bg">
        <div class="client-progress-bar-fill" style="width:${pct}%"></div>
      </div>
      <div class="client-progress-txt">${st.ok} / ${st.total} מסמכים התקבלו · ${st.missing} חסרים</div>
      <div class="client-card-actions">
        <button class="btn-sm btn-primary" onclick="event.stopPropagation();openEditor('${c.id}')">עריכה</button>
        <button class="btn-sm btn-gold" onclick="event.stopPropagation();copyLink('${c.id}')">העתק קישור</button>
        <a class="wa-btn" href="https://wa.me/?text=${encodeURIComponent('שלום ' + c.name + ', לחץ על הקישור כדי לראות את רשימת המסמכים הנדרשים לדוח השנתי:\n' + clientUrl)}" target="_blank" onclick="event.stopPropagation()">📱 WA</a>
        <button class="btn-sm btn-danger" onclick="event.stopPropagation();deleteClient('${c.id}')">מחק</button>
      </div>
    </div>`;
}

function copyLink(id) {
  const c = getClient(id);
  const url = BASE_CLIENT_URL + '?client=' + encodeURIComponent(c.name) + '&id=' + id;
  navigator.clipboard.writeText(url).then(() => showToast('✓ הקישור הועתק!'));
}

function deleteClient(id) {
  if (!confirm('למחוק לקוח זה?')) return;
  clients = clients.filter(c => c.id !== id);
  saveClients();
  renderAll();
  showToast('✓ לקוח נמחק');
}

// ── RENDER ALL ────────────────────────────────────────────────────────────
function renderAll() {
  const total = clients.length;
  const totalMissing = clients.reduce((a,c) => a + getClientStats(c).missing, 0);
  const totalOk = clients.reduce((a,c) => a + getClientStats(c).ok, 0);
  const done = clients.filter(c => getClientStats(c).missing === 0).length;
  document.getElementById('dashStats').innerHTML = `
    <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-num">${total}</div><div class="stat-label">לקוחות פעילים</div></div>
    <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-num">${totalOk}</div><div class="stat-label">מסמכים התקבלו</div></div>
    <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-num">${totalMissing}</div><div class="stat-label">מסמכים חסרים</div></div>
    <div class="stat-card"><div class="stat-icon">🏁</div><div class="stat-num">${done}</div><div class="stat-label">לקוחות הושלמו</div></div>`;
  const grid = clients.map(clientCardHTML).join('') || '<div style="color:var(--gray);font-size:14px;padding:20px">אין לקוחות עדיין — הוסף לקוח חדש</div>';
  document.getElementById('dashClientGrid').innerHTML = grid;
  document.getElementById('allClientGrid').innerHTML = grid;
}

// ── ADD CLIENT ────────────────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('newClientName').focus(), 100);
}
function closeModal() {
  document.getElementById('addModal').classList.remove('open');
  document.getElementById('newClientName').value = '';
  document.getElementById('newClientNotes').value = '';
}

async function addClient() {
  const name = document.getElementById('newClientName').value.trim();
  if (!name) { showToast('יש להזין שם לקוח'); return; }
  const notes = document.getElementById('newClientNotes').value.trim();
  const newClient = { id: uid(), name, notes, created: Date.now(), sections: deepClone(DEFAULT_SECTIONS) };
  clients.unshift(newClient);
  closeModal();
  renderAll();
  showToast('✓ לקוח נוסף — שומר...');
  await saveClients();
  showToast('✓ לקוח נשמר בענן');
}

// ── EDITOR ────────────────────────────────────────────────────────────────
function openEditor(id) {
  currentClientId = id;
  renderEditor(getClient(id));
  showTab('editor');
}

function renderEditor(c) {
  const st = getClientStats(c);
  const pct = st.total > 0 ? Math.round(st.ok / st.total * 100) : 0;
  const clientUrl = BASE_CLIENT_URL + '?client=' + encodeURIComponent(c.name) + '&id=' + c.id;

  const sectionsHTML = c.sections.map((sec, si) => {
    const secOk = sec.items.filter(i => i.status === 'ok').length;
    const secTotal = sec.items.filter(i => i.status !== 'na').length;
    const itemsHTML = sec.items.map((item, ii) => `
      <div class="editor-item" id="eitem-${si}-${ii}">
        <div style="flex:1">
          <div class="editor-item-text">${item.text}</div>
          ${item.note ? `<div class="editor-item-note">${item.note}</div>` : ''}
        </div>
        <select class="status-select s-${item.status}" onchange="changeStatus('${c.id}',${si},${ii},this.value)">
          <option value="missing" ${item.status==='missing'?'selected':''}>חסר</option>
          <option value="ok" ${item.status==='ok'?'selected':''}>התקבל ✓</option>
          <option value="pending" ${item.status==='pending'?'selected':''}>בטיפול</option>
          <option value="na" ${item.status==='na'?'selected':''}>לא רלוונטי</option>
        </select>
        <button class="item-del-btn" onclick="deleteItem('${c.id}',${si},${ii})" title="מחק פריט">×</button>
      </div>`).join('');
    return `
      <div class="editor-section">
        <div class="editor-section-header" onclick="toggleEditorSection(${si})">
          <span class="editor-section-icon">${sec.icon}</span>
          <span class="editor-section-title">${sec.title}</span>
          <span class="editor-section-stats">${secOk}/${secTotal}</span>
          <span class="editor-section-toggle" id="etoggle-${si}">▼</span>
        </div>
        <div class="editor-section-body" id="esec-${si}">
          ${itemsHTML}
          <div class="add-item-row">
            <input class="add-item-input" id="newitem-${si}" placeholder="הוסף פריט חדש..." onkeydown="if(event.key==='Enter')addItem('${c.id}',${si})">
            <button class="add-item-btn" onclick="addItem('${c.id}',${si})">+ הוסף</button>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('editorContent').innerHTML = `
    <div class="editor-header">
      <div class="editor-avatar">${c.name.charAt(0)}</div>
      <div>
        <div class="editor-client-name">${c.name}</div>
        <div class="editor-client-meta">${c.notes || ''} · ${st.ok}/${st.total} התקבלו (${pct}%)</div>
      </div>
      <div class="editor-actions">
        <button class="btn-sm btn-gold" onclick="copyLink('${c.id}')">📋 העתק קישור</button>
        <a class="wa-btn" href="https://wa.me/?text=${encodeURIComponent('שלום ' + c.name + ', לחץ על הקישור לרשימת המסמכים הנדרשים לדוח השנתי:\n' + clientUrl)}" target="_blank">📱 שלח ב-WA</a>
      </div>
    </div>
    <div class="link-box">
      <span class="link-box-url">${clientUrl}</span>
      <button class="copy-btn" onclick="copyLink('${c.id}')">העתק</button>
    </div>
    <div class="editor-sections">${sectionsHTML}</div>`;
}

function toggleEditorSection(si) {
  document.getElementById(`esec-${si}`).classList.toggle('collapsed');
  document.getElementById(`etoggle-${si}`).classList.toggle('open');
}

async function changeStatus(clientId, si, ii, val) {
  const c = getClient(clientId);
  c.sections[si].items[ii].status = val;
  const sel = document.querySelector(`#eitem-${si}-${ii} .status-select`);
  if (sel) sel.className = 'status-select s-' + val;
  await saveClients();
}

async function deleteItem(clientId, si, ii) {
  const c = getClient(clientId);
  c.sections[si].items.splice(ii, 1);
  renderEditor(c);
  await saveClients();
}

async function addItem(clientId, si) {
  const inp = document.getElementById(`newitem-${si}`);
  const text = inp.value.trim();
  if (!text) return;
  const c = getClient(clientId);
  c.sections[si].items.push({ id: uid(), text, note: '', status: 'missing' });
  inp.value = '';
  renderEditor(c);
  showToast('✓ פריט נוסף');
  await saveClients();
}
</script>
